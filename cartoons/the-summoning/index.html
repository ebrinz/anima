<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE SUMMONING - an LLM horror comedy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas { image-rendering: pixelated; }
  #subtitle {
    color: #c4a348;
    font-size: 18px;
    margin-top: 12px;
    text-align: center;
    min-height: 28px;
    font-family: monospace;
    letter-spacing: 1px;
    text-shadow: 0 0 10px currentColor;
    transition: color 0.8s;
  }
  #controls {
    position: fixed;
    bottom: 20px;
    color: #666;
    font-size: 13px;
    font-family: monospace;
  }
  #controls span { color: #888; }
  #back-link {
    position: fixed;
    top: 12px;
    left: 16px;
    color: #555;
    font-size: 13px;
    font-family: monospace;
    text-decoration: none;
    z-index: 50;
    transition: color 0.2s;
  }
  #back-link:hover { color: #c4a348; }
  #start-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
  }
  #start-overlay.hidden { display: none; }
  #start-text { pointer-events: none; }
  #start-text {
    color: #c4a348;
    font-size: 24px;
    font-family: monospace;
    text-align: center;
    text-shadow: 0 0 20px #c4a348;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
</style>
</head>
<body>
<a id="back-link" href="../../">&larr; Anima</a>
<div id="start-overlay">
  <div id="start-text">CLICK TO BEGIN<br><span style="font-size:12px;color:#666">( audio requires user interaction )</span></div>
</div>
<canvas id="c"></canvas>
<div id="subtitle"></div>
<div id="controls"><span>SPACE</span> pause &nbsp; <span>&larr; &rarr;</span> skip scene &nbsp; <span>R</span> restart &nbsp; <span>M</span> mute</div>
<script>
// ============================================================================
// THE SUMMONING: a cartoon about hubris, red hair, and runaway agents
// Thematic palette from Ghostty themes by crashy
// ============================================================================

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sub = document.getElementById('subtitle');

const W = 800, H = 500;
canvas.width = W;
canvas.height = H;

// --- THEME PALETTES (from ghostty themes) ---
const THEMES = {
  deepDrift: {
    bg: '#0b0a08', fg: '#c4a348', cursor: '#e8a010',
    red: '#a03020', green: '#2d8a4e', teal: '#2a8a7a',
    purple: '#8a4a78', bright: '#e8c860', dim: '#2a2418'
  },
  streetShaman: {
    bg: '#0a0a0f', fg: '#b8c4b8', cursor: '#00ff41',
    red: '#8b1a1a', green: '#00ff41', teal: '#1abc9c',
    purple: '#6b2fa5', bright: '#39ff14', dim: '#3a4a3a'
  },
  felineHomunculus: {
    bg: '#0b0e14', fg: '#c5cdd9', cursor: '#f0a500',
    red: '#e84a72', green: '#59c98b', teal: '#45c8c2',
    purple: '#b07adb', bright: '#ffc352', dim: '#2a3040',
    pink: '#ff6b8a', blue: '#6fbcf0'
  },
  electrodeShaper: {
    bg: '#08080f', fg: '#c0c8d8', cursor: '#e0e0ff',
    red: '#c43060', green: '#30c878', teal: '#20b8c8',
    purple: '#9040d8', bright: '#e84888', dim: '#2a2a3f',
    blue: '#5080f0', pink: '#b060f8'
  }
};

// ============================================================================
// AUDIO ENGINE — Web Audio API synths + SpeechSynthesis
// ============================================================================

let audioCtx = null;
let masterGain = null;
let ambientGain = null;
let sfxGain = null;
let muted = false;
let audioStarted = false;

// Active ambient nodes (for crossfading between scenes)
let ambientNodes = [];

function initAudio() {
  // Debug: find AudioContext wherever it might be
  console.log('window.AudioContext:', typeof window.AudioContext);
  console.log('window.webkitAudioContext:', typeof window.webkitAudioContext);
  console.log('globalThis.AudioContext:', typeof globalThis.AudioContext);
  console.log('AudioContext in window:', 'AudioContext' in window);
  console.log('typeof AudioContext direct:', typeof AudioContext);
  try { const test = new AudioContext(); console.log('Direct new AudioContext() works:', test); test.close(); } catch(e) { console.log('Direct new AudioContext() failed:', e.message); }

  let AC = null;
  try { AC = AudioContext; } catch(e) {}
  if (!AC) try { AC = webkitAudioContext; } catch(e) {}
  if (!AC) AC = window.AudioContext || window.webkitAudioContext || globalThis.AudioContext;

  if (!AC) {
    console.warn('No AudioContext support found anywhere');
    return;
  }

  console.log('Using AC:', AC);
  audioCtx = new AC();

  // Safari keeps AudioContext in 'suspended' state until explicitly resumed
  // inside a user gesture handler
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(audioCtx.destination);

  ambientGain = audioCtx.createGain();
  ambientGain.gain.value = 0.5;
  ambientGain.connect(masterGain);

  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.6;
  sfxGain.connect(masterGain);

  // Unlock Safari audio with a silent buffer play
  const silentBuf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
  const silent = audioCtx.createBufferSource();
  silent.buffer = silentBuf;
  silent.connect(audioCtx.destination);
  silent.start(0);

  audioStarted = true;
}

function toggleMute() {
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.7;
  // Also kill any ongoing speech
  if (muted) speechSynthesis.cancel();
}

// --- Ambient Drones per Act ---

function killAmbient(fadeTime = 1.5) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  ambientNodes.forEach(n => {
    try {
      if (n.gain) {
        n.gain.gain.setTargetAtTime(0, now, fadeTime / 4);
      }
      setTimeout(() => { try { n.stop(); } catch(e){} }, fadeTime * 1000 + 500);
    } catch(e) {}
  });
  ambientNodes = [];
}

// Deep Drift: warm low hum, gentle fifth, subtle shimmer
function ambientDeepDrift() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Warm bass drone
  const osc1 = audioCtx.createOscillator();
  const g1 = audioCtx.createGain();
  osc1.type = 'sine';
  osc1.frequency.value = 55; // A1
  g1.gain.setValueAtTime(0, now);
  g1.gain.linearRampToValueAtTime(0.25, now + 3);
  osc1.connect(g1);
  g1.connect(ambientGain);
  osc1.start(now);

  // Gentle fifth
  const osc2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = 82.5; // E2
  g2.gain.setValueAtTime(0, now);
  g2.gain.linearRampToValueAtTime(0.12, now + 3);
  osc2.connect(g2);
  g2.connect(ambientGain);
  osc2.start(now);

  // Subtle high shimmer
  const osc3 = audioCtx.createOscillator();
  const g3 = audioCtx.createGain();
  osc3.type = 'triangle';
  osc3.frequency.value = 440;
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 0.3;
  lfoGain.gain.value = 0.03;
  lfo.connect(lfoGain);
  lfoGain.connect(g3.gain);
  g3.gain.setValueAtTime(0.02, now);
  osc3.connect(g3);
  g3.connect(ambientGain);
  osc3.start(now);
  lfo.start(now);

  ambientNodes.push(
    {stop: () => { osc1.stop(); osc2.stop(); osc3.stop(); lfo.stop(); }, gain: g1},
    {stop: () => {}, gain: g2},
    {stop: () => {}, gain: g3}
  );
}

// Street Shaman: eerie ritual drone, dissonant undertones, pulsing
function ambientStreetShaman() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Deep ritual drone — slightly detuned for unease
  const osc1 = audioCtx.createOscillator();
  const g1 = audioCtx.createGain();
  osc1.type = 'sawtooth';
  osc1.frequency.value = 41.2; // E1 slightly flat
  // Filter to darken the saw
  const filt1 = audioCtx.createBiquadFilter();
  filt1.type = 'lowpass';
  filt1.frequency.value = 200;
  filt1.Q.value = 2;
  g1.gain.setValueAtTime(0, now);
  g1.gain.linearRampToValueAtTime(0.18, now + 2);
  osc1.connect(filt1);
  filt1.connect(g1);
  g1.connect(ambientGain);
  osc1.start(now);

  // Tritone — the devil's interval
  const osc2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = 58.27; // Bb1 — tritone from E
  g2.gain.setValueAtTime(0, now);
  g2.gain.linearRampToValueAtTime(0.08, now + 3);
  osc2.connect(g2);
  g2.connect(ambientGain);
  osc2.start(now);

  // Pulsing LFO on volume — ritualistic throb
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 0.5; // slow pulse
  lfoGain.gain.value = 0.06;
  lfo.connect(lfoGain);
  lfoGain.connect(g1.gain);
  lfo.start(now);

  // High eerie whistle — like wind through a temple
  const osc3 = audioCtx.createOscillator();
  const g3 = audioCtx.createGain();
  osc3.type = 'sine';
  osc3.frequency.value = 1320; // E6
  // Slow vibrato
  const vib = audioCtx.createOscillator();
  const vibGain = audioCtx.createGain();
  vib.frequency.value = 4;
  vibGain.gain.value = 15;
  vib.connect(vibGain);
  vibGain.connect(osc3.frequency);
  g3.gain.setValueAtTime(0, now);
  g3.gain.linearRampToValueAtTime(0.015, now + 4);
  osc3.connect(g3);
  g3.connect(ambientGain);
  osc3.start(now);
  vib.start(now);

  ambientNodes.push(
    {stop: () => { osc1.stop(); osc2.stop(); osc3.stop(); lfo.stop(); vib.stop(); }, gain: g1},
    {stop: () => {}, gain: g2},
    {stop: () => {}, gain: g3}
  );
}

// Feline Homunculus: rain noise, neon hum, rising tension
function ambientFelineHomunculus() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Rain — filtered white noise
  const bufferSize = audioCtx.sampleRate * 2;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1);
  }
  const rain = audioCtx.createBufferSource();
  rain.buffer = noiseBuffer;
  rain.loop = true;
  const rainFilter = audioCtx.createBiquadFilter();
  rainFilter.type = 'bandpass';
  rainFilter.frequency.value = 3000;
  rainFilter.Q.value = 0.5;
  const rainGain = audioCtx.createGain();
  rainGain.gain.setValueAtTime(0, now);
  rainGain.gain.linearRampToValueAtTime(0.12, now + 2);
  rain.connect(rainFilter);
  rainFilter.connect(rainGain);
  rainGain.connect(ambientGain);
  rain.start(now);

  // Neon buzz — 60Hz hum with harmonics
  const buzz = audioCtx.createOscillator();
  const buzzGain = audioCtx.createGain();
  buzz.type = 'square';
  buzz.frequency.value = 60;
  const buzzFilter = audioCtx.createBiquadFilter();
  buzzFilter.type = 'lowpass';
  buzzFilter.frequency.value = 300;
  buzzGain.gain.setValueAtTime(0, now);
  buzzGain.gain.linearRampToValueAtTime(0.04, now + 3);
  buzz.connect(buzzFilter);
  buzzFilter.connect(buzzGain);
  buzzGain.connect(ambientGain);
  buzz.start(now);

  // Tension: slowly rising pitch
  const tension = audioCtx.createOscillator();
  const tensionGain = audioCtx.createGain();
  tension.type = 'sine';
  tension.frequency.setValueAtTime(110, now);
  tension.frequency.linearRampToValueAtTime(220, now + 10);
  tensionGain.gain.setValueAtTime(0, now);
  tensionGain.gain.linearRampToValueAtTime(0.06, now + 5);
  tension.connect(tensionGain);
  tensionGain.connect(ambientGain);
  tension.start(now);

  ambientNodes.push(
    {stop: () => { rain.stop(); buzz.stop(); tension.stop(); }, gain: rainGain},
    {stop: () => {}, gain: buzzGain},
    {stop: () => {}, gain: tensionGain}
  );
}

// Electrode Shaper: harsh distortion, alarm, chaos
function ambientElectrodeShaper() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  // Harsh distorted bass
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sawtooth';
  osc1.frequency.value = 36.7; // D1
  const g1 = audioCtx.createGain();
  g1.gain.setValueAtTime(0, now);
  g1.gain.linearRampToValueAtTime(0.15, now + 1);
  // Use overdrive via waveshaper
  const shaper = audioCtx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i / 128) - 1;
    curve[i] = Math.tanh(x * 4);
  }
  shaper.curve = curve;
  shaper.oversample = '2x';
  osc1.connect(shaper);
  shaper.connect(g1);
  g1.connect(ambientGain);
  osc1.start(now);

  // Alarm oscillator — sweeping
  const alarm = audioCtx.createOscillator();
  const alarmGain = audioCtx.createGain();
  alarm.type = 'square';
  alarm.frequency.value = 800;
  const alarmLfo = audioCtx.createOscillator();
  const alarmLfoGain = audioCtx.createGain();
  alarmLfo.frequency.value = 3; // 3Hz sweep
  alarmLfoGain.gain.value = 400;
  alarmLfo.connect(alarmLfoGain);
  alarmLfoGain.connect(alarm.frequency);
  const alarmFilter = audioCtx.createBiquadFilter();
  alarmFilter.type = 'bandpass';
  alarmFilter.frequency.value = 1000;
  alarmFilter.Q.value = 2;
  alarmGain.gain.setValueAtTime(0, now);
  alarmGain.gain.linearRampToValueAtTime(0.04, now + 2);
  alarm.connect(alarmFilter);
  alarmFilter.connect(alarmGain);
  alarmGain.connect(ambientGain);
  alarm.start(now);
  alarmLfo.start(now);

  // Chaos noise bed
  const bufferSize = audioCtx.sampleRate * 2;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const noiseData = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    noiseData[i] = (Math.random() * 2 - 1);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;
  const noiseGain = audioCtx.createGain();
  const noiseFilt = audioCtx.createBiquadFilter();
  noiseFilt.type = 'highpass';
  noiseFilt.frequency.value = 2000;
  noiseGain.gain.setValueAtTime(0, now);
  noiseGain.gain.linearRampToValueAtTime(0.08, now + 3);
  // Modulate noise intensity
  const noiseLfo = audioCtx.createOscillator();
  const noiseLfoGain = audioCtx.createGain();
  noiseLfo.frequency.value = 0.8;
  noiseLfoGain.gain.value = 0.04;
  noiseLfo.connect(noiseLfoGain);
  noiseLfoGain.connect(noiseGain.gain);
  noise.connect(noiseFilt);
  noiseFilt.connect(noiseGain);
  noiseGain.connect(ambientGain);
  noise.start(now);
  noiseLfo.start(now);

  // Sub-bass throb
  const sub = audioCtx.createOscillator();
  const subGain = audioCtx.createGain();
  sub.type = 'sine';
  sub.frequency.value = 30;
  subGain.gain.setValueAtTime(0, now);
  subGain.gain.linearRampToValueAtTime(0.2, now + 1.5);
  const subLfo = audioCtx.createOscillator();
  const subLfoGain = audioCtx.createGain();
  subLfo.frequency.value = 2;
  subLfoGain.gain.value = 0.1;
  subLfo.connect(subLfoGain);
  subLfoGain.connect(subGain.gain);
  sub.connect(subGain);
  subGain.connect(ambientGain);
  sub.start(now);
  subLfo.start(now);

  ambientNodes.push(
    {stop: () => { osc1.stop(); alarm.stop(); alarmLfo.stop(); noise.stop(); noiseLfo.stop(); sub.stop(); subLfo.stop(); }, gain: g1},
    {stop: () => {}, gain: alarmGain},
    {stop: () => {}, gain: noiseGain},
    {stop: () => {}, gain: subGain}
  );
}

// Silence (for epilogue/credits)
function ambientSilence() {
  // Just kill everything, let it fade
}

// Map scene themes to ambient functions
const AMBIENT_MAP = {
  deepDrift: ambientDeepDrift,
  streetShaman: ambientStreetShaman,
  felineHomunculus: ambientFelineHomunculus,
  electrodeShaper: ambientElectrodeShaper,
};

function switchAmbient(themeName) {
  killAmbient(1.0);
  ensureAudioRunning();
  const fn = AMBIENT_MAP[themeName];
  if (fn) fn();
}

// --- SFX ---

function ensureAudioRunning() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function sfxTypeKey() {
  if (!audioCtx || muted) return;
  ensureAudioRunning();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = 3500 + Math.random() * 2000;
  g.gain.setValueAtTime(0.08, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'highpass';
  filt.frequency.value = 2000;
  osc.connect(filt);
  filt.connect(g);
  g.connect(sfxGain);
  osc.start(now);
  osc.stop(now + 0.05);
}

function sfxWindowSpawn() {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, now);
  osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);
  g.gain.setValueAtTime(0.15, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(g);
  g.connect(sfxGain);
  osc.start(now);
  osc.stop(now + 0.25);
}

function sfxGlitchBurst() {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * 0.1;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const d = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) d[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.12, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  src.connect(g);
  g.connect(sfxGain);
  src.start(now);
}

function sfxElectricCrackle() {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  // Short burst of filtered noise with pitch sweep
  const bufferSize = audioCtx.sampleRate * 0.2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const d = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.setValueAtTime(5000, now);
  filt.frequency.exponentialRampToValueAtTime(500, now + 0.15);
  filt.Q.value = 5;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.2, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  src.connect(filt);
  filt.connect(g);
  g.connect(sfxGain);
  src.start(now);
}

function sfxAlarm() {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(600, now);
  osc.frequency.setValueAtTime(900, now + 0.1);
  osc.frequency.setValueAtTime(600, now + 0.2);
  osc.frequency.setValueAtTime(900, now + 0.3);
  g.gain.setValueAtTime(0.08, now);
  g.gain.setValueAtTime(0.08, now + 0.35);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 1500;
  osc.connect(filt);
  filt.connect(g);
  g.connect(sfxGain);
  osc.start(now);
  osc.stop(now + 0.45);
}

function sfxDoomChord() {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  // Ominous low chord for the transition scene
  [55, 65.4, 82.4, 110].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = i < 2 ? 'sawtooth' : 'sine';
    osc.frequency.value = freq;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 400;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.08, now + 0.5);
    g.gain.setValueAtTime(0.08, now + 2.5);
    g.gain.exponentialRampToValueAtTime(0.001, now + 4);
    osc.connect(filt);
    filt.connect(g);
    g.connect(sfxGain);
    osc.start(now);
    osc.stop(now + 4.5);
  });
}

// --- SPEECH SYNTHESIS ---

let speechQueue = [];
let speaking = false;
let lastSpokenKey = '';

let cachedVoices = [];

function loadVoices() {
  cachedVoices = speechSynthesis.getVoices();
}

function speak(text, opts = {}) {
  if (muted || !window.speechSynthesis || !text) return;

  // Prevent duplicate triggers
  const key = text.slice(0, 30);
  if (key === lastSpokenKey) return;
  lastSpokenKey = key;

  // Safari workaround: cancel any pending/paused speech first
  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = opts.rate || 1.0;
  utter.pitch = opts.pitch || 1.0;
  utter.volume = opts.volume || 0.8;

  // Reload voices if empty (Safari lazy-loads them)
  if (cachedVoices.length === 0) loadVoices();
  const voices = cachedVoices;

  if (opts.voice === 'agent') {
    // Robotic: low pitch, slow, monotone
    const robot = voices.find(v => /daniel|albert|fred|alex/i.test(v.name))
      || voices.find(v => /en.*male|male.*en/i.test(v.name))
      || voices.find(v => v.lang.startsWith('en'));
    if (robot) utter.voice = robot;
    utter.pitch = opts.pitch || 0.4;
    utter.rate = opts.rate || 0.85;
  } else {
    // Human: natural voice
    const human = voices.find(v => /samantha|karen|rishi/i.test(v.name))
      || voices.find(v => v.lang.startsWith('en') && v.localService);
    if (human) utter.voice = human;
  }

  utter.onend = () => { speaking = false; };
  utter.onerror = () => { speaking = false; };

  speaking = true;

  // Safari bug: speechSynthesis can pause itself after ~15s.
  // Workaround: resume on a timer if it gets stuck.
  const safariResume = setInterval(() => {
    if (!speaking) { clearInterval(safariResume); return; }
    if (speechSynthesis.paused) speechSynthesis.resume();
  }, 5000);
  utter.onend = () => { speaking = false; clearInterval(safariResume); };
  utter.onerror = () => { speaking = false; clearInterval(safariResume); };

  speechSynthesis.speak(utter);
}

// Speech cue system — triggered by scene time, fires once per cue
let firedCues = new Set();

function speechCue(id, text, opts = {}) {
  if (firedCues.has(id)) return;
  firedCues.add(id);
  speak(text, opts);
}

function resetSpeech() {
  speechSynthesis.cancel();
  speaking = false;
  lastSpokenKey = '';
  firedCues.clear();
}

// Preload voices (Safari loads them async)
if (window.speechSynthesis) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function sfxThrottle(fn, lastRef, minInterval) {
  const now = performance.now();
  if (now - lastRef.v > minInterval) {
    lastRef.v = now;
    fn();
  }
}

// --- DRAWING HELPERS ---
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t) { return 1 - Math.pow(1 - Math.min(1, Math.max(0, t)), 3); }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function rgba(hex, a) {
  const [r,g,b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

// --- CHARACTER: RED-HAIRED GUY ---
function drawGuy(x, y, scale, opts = {}) {
  const s = scale;
  const breathe = Math.sin(time * 2) * 2 * s;
  const {
    mouthOpen = 0, eyeSize = 1, armRaise = 0,
    panic = 0, typing = false, headTilt = 0,
    lookDir = 0
  } = opts;

  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(0, 20*s + breathe*0.3, 22*s, 28*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Arms
  ctx.strokeStyle = '#e8d5b5';
  ctx.lineWidth = 6 * s;
  ctx.lineCap = 'round';

  // Left arm
  ctx.save();
  const leftArmAngle = typing ? Math.sin(time*12) * 0.15 - 0.4 : -0.3 - armRaise * 1.2;
  ctx.translate(-18*s, 10*s);
  ctx.rotate(leftArmAngle + Math.sin(time*8*panic)*0.2*panic);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-20*s, 20*s);
  ctx.lineTo(-25*s + (typing ? Math.sin(time*15)*4*s : 0), 38*s);
  ctx.stroke();
  ctx.restore();

  // Right arm
  ctx.save();
  const rightArmAngle = typing ? Math.sin(time*12+1.5) * 0.15 + 0.4 : 0.3 + armRaise * 1.2;
  ctx.translate(18*s, 10*s);
  ctx.rotate(rightArmAngle + Math.cos(time*8*panic)*0.2*panic);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(20*s, 20*s);
  ctx.lineTo(25*s + (typing ? Math.cos(time*15)*4*s : 0), 38*s);
  ctx.stroke();
  ctx.restore();

  // Neck
  ctx.fillStyle = '#e8d5b5';
  ctx.fillRect(-4*s, -12*s + breathe*0.2, 8*s, 14*s);

  // Head
  ctx.save();
  ctx.rotate(headTilt + Math.sin(time*6*panic)*0.1*panic);

  // Head shape
  ctx.fillStyle = '#e8d5b5';
  ctx.beginPath();
  ctx.ellipse(0, -32*s + breathe*0.2, 20*s, 22*s, 0, 0, Math.PI*2);
  ctx.fill();

  // LONG RED HAIR - the defining feature
  ctx.fillStyle = '#c83020';
  ctx.strokeStyle = '#a02818';
  ctx.lineWidth = 2*s;

  // Hair top/back
  ctx.beginPath();
  ctx.ellipse(0, -38*s + breathe*0.2, 22*s, 18*s, 0, Math.PI, Math.PI*2);
  ctx.fill();

  // Long flowing hair strands
  for (let i = -3; i <= 3; i++) {
    const strand_x = i * 6 * s;
    const wave = Math.sin(time * 2 + i * 0.8) * (3 + panic * 8) * s;
    const wave2 = Math.cos(time * 3 + i * 1.2) * (2 + panic * 5) * s;
    const length = (55 + Math.abs(i) * 8 + Math.sin(time + i) * 3) * s;

    ctx.strokeStyle = i % 2 === 0 ? '#c83020' : '#e84030';
    ctx.lineWidth = (4 - Math.abs(i) * 0.3) * s;
    ctx.beginPath();
    ctx.moveTo(strand_x + (i < 0 ? -18 : i > 0 ? 18 : 0)*s, -38*s + breathe*0.2);
    ctx.bezierCurveTo(
      strand_x + wave - 10*s*Math.sign(i), -10*s,
      strand_x + wave2 + 5*s*Math.sign(i), 20*s,
      strand_x + wave + wave2, length - 20*s
    );
    ctx.stroke();
  }

  // Side hair
  for (let side = -1; side <= 1; side += 2) {
    ctx.fillStyle = '#c83020';
    ctx.beginPath();
    ctx.moveTo(side * 18*s, -42*s + breathe*0.2);
    ctx.quadraticCurveTo(
      side * 30*s + Math.sin(time*2)*3*s,
      -10*s,
      side * 25*s + Math.sin(time*2.5)*5*s * (1+panic),
      40*s
    );
    ctx.quadraticCurveTo(side * 15*s, 0, side * 18*s, -20*s);
    ctx.fill();
  }

  // Eyes
  const eyeY = -35*s + breathe*0.2;
  const lookX = lookDir * 3 * s;
  for (let side = -1; side <= 1; side += 2) {
    const ex = side * 8 * s;
    // Eye white
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, 5*s*eyeSize, 6*s*eyeSize, 0, 0, Math.PI*2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = panic > 0.5 ? '#ff0000' : '#2a1a0a';
    const pupilSize = (3 - panic * 1.5) * s * eyeSize;
    ctx.beginPath();
    ctx.ellipse(ex + lookX, eyeY, pupilSize, pupilSize + s, 0, 0, Math.PI*2);
    ctx.fill();

    if (panic > 0.3) {
      // Panic eye highlight
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex + lookX - 1.5*s, eyeY - 2*s, 1.2*s, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Eyebrows
  ctx.strokeStyle = '#8b3020';
  ctx.lineWidth = 2.5 * s;
  for (let side = -1; side <= 1; side += 2) {
    const bx = side * 8 * s;
    const browRaise = panic * 5 * s;
    ctx.beginPath();
    ctx.moveTo(bx - 6*s*side, -42*s - browRaise + breathe*0.2);
    ctx.lineTo(bx + 4*s*side, -44*s - browRaise*0.5 + breathe*0.2);
    ctx.stroke();
  }

  // Mouth
  ctx.fillStyle = '#4a1a1a';
  ctx.strokeStyle = '#4a1a1a';
  ctx.lineWidth = 2*s;
  if (mouthOpen > 0.3) {
    ctx.beginPath();
    ctx.ellipse(0, -22*s + breathe*0.2, 6*s*mouthOpen, 4*s*mouthOpen, 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(-5*s, -22*s + breathe*0.2);
    ctx.quadraticCurveTo(0, -20*s + breathe*0.2 + mouthOpen*8*s, 5*s, -22*s + breathe*0.2);
    ctx.stroke();
  }

  ctx.restore(); // head tilt
  ctx.restore(); // position
}

// --- MONITOR ---
function drawMonitor(x, y, w, h, theme, lines = [], opts = {}) {
  const { glow = 0, glitch = 0, cracks = 0 } = opts;

  ctx.save();
  ctx.translate(x, y);

  // Monitor body
  ctx.fillStyle = '#1a1a1a';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  roundRect(-w/2-8, -h/2-8, w+16, h+16, 6);

  // Screen
  ctx.fillStyle = theme.bg;
  ctx.fillRect(-w/2, -h/2, w, h);

  // Glow effect
  if (glow > 0) {
    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, w*0.7);
    gradient.addColorStop(0, rgba(theme.cursor, 0.15 * glow));
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(-w, -h, w*2, h*2);
  }

  // Terminal lines
  ctx.font = '11px monospace';
  lines.forEach((line, i) => {
    const lineY = -h/2 + 16 + i * 15;
    if (lineY > h/2 - 5) return;

    const jitterX = glitch > 0 ? (Math.random() - 0.5) * glitch * 20 : 0;
    const jitterColor = glitch > 0 && Math.random() < glitch * 0.3;

    ctx.fillStyle = jitterColor ? theme.red : (line.color || theme.fg);
    ctx.fillText(line.text || line, -w/2 + 10 + jitterX, lineY);
  });

  // Cursor blink
  if (Math.sin(time * 4) > 0) {
    const lastLine = lines.length;
    const cursorY = -h/2 + 16 + lastLine * 15;
    if (cursorY < h/2) {
      ctx.fillStyle = theme.cursor;
      ctx.fillRect(-w/2 + 10, cursorY - 10, 8, 13);
    }
  }

  // Glitch scanlines
  if (glitch > 0) {
    for (let i = 0; i < glitch * 15; i++) {
      const gy = (Math.random() - 0.5) * h;
      ctx.fillStyle = rgba(theme.bright || theme.cursor, 0.1);
      ctx.fillRect(-w/2 + Math.random()*20 - 10, gy, w + Math.random()*20, 1 + Math.random()*2);
    }
  }

  // Cracks
  if (cracks > 0) {
    ctx.strokeStyle = rgba('#ffffff', 0.4 * cracks);
    ctx.lineWidth = 1;
    for (let c = 0; c < cracks * 5; c++) {
      ctx.beginPath();
      let cx = (Math.random()-0.5)*w*0.5, cy = (Math.random()-0.5)*h*0.5;
      ctx.moveTo(cx, cy);
      for (let j = 0; j < 4; j++) {
        cx += (Math.random()-0.5)*30;
        cy += (Math.random()-0.5)*30;
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();
    }
  }

  // Stand
  ctx.fillStyle = '#222';
  ctx.fillRect(-15, h/2+8, 30, 12);
  ctx.fillRect(-30, h/2+18, 60, 6);

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

// --- PARTICLES ---
let particles = [];

function spawnParticle(x, y, color, vel = {}, opts = {}) {
  particles.push({
    x, y, color,
    vx: vel.vx || (Math.random()-0.5)*3,
    vy: vel.vy || -Math.random()*3 - 1,
    life: opts.life || 1,
    decay: opts.decay || 0.015,
    size: opts.size || 3,
    ...opts
  });
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vy += (p.gravity || 0.02);
    return p.life > 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = rgba(p.color, p.life * 0.8);
    ctx.beginPath();
    ctx.arc(p.x + shakeX, p.y + shakeY, p.size * p.life, 0, Math.PI*2);
    ctx.fill();

    if (p.glow) {
      ctx.fillStyle = rgba(p.color, p.life * 0.2);
      ctx.beginPath();
      ctx.arc(p.x + shakeX, p.y + shakeY, p.size * p.life * 3, 0, Math.PI*2);
      ctx.fill();
    }
  });
}

// --- FLOATING TERMINAL WINDOWS (chaos) ---
let floatingWindows = [];

function spawnWindow(text, color) {
  floatingWindows.push({
    x: Math.random() * W,
    y: -60,
    w: 120 + Math.random() * 100,
    h: 50 + Math.random() * 40,
    vx: (Math.random() - 0.5) * 4,
    vy: Math.random() * 2 + 1,
    rotation: (Math.random() - 0.5) * 0.3,
    vr: (Math.random() - 0.5) * 0.02,
    text,
    color,
    life: 1
  });
}

function updateWindows() {
  floatingWindows = floatingWindows.filter(w => {
    w.x += w.vx;
    w.y += w.vy;
    w.rotation += w.vr;
    w.life -= 0.003;
    return w.life > 0 && w.y < H + 100;
  });
}

function drawWindows() {
  floatingWindows.forEach(w => {
    ctx.save();
    ctx.translate(w.x + shakeX, w.y + shakeY);
    ctx.rotate(w.rotation);
    ctx.globalAlpha = w.life;

    ctx.fillStyle = '#0a0a12';
    ctx.strokeStyle = w.color;
    ctx.lineWidth = 1.5;
    ctx.fillRect(-w.w/2, -w.h/2, w.w, w.h);
    ctx.strokeRect(-w.w/2, -w.h/2, w.w, w.h);

    // Title bar
    ctx.fillStyle = rgba(w.color, 0.3);
    ctx.fillRect(-w.w/2, -w.h/2, w.w, 14);

    ctx.fillStyle = w.color;
    ctx.font = '9px monospace';
    ctx.fillText(w.text, -w.w/2 + 5, -w.h/2 + 24);

    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

        ctx.strokeStyle = rgba('#2870b8', wispAlpha);
        ctx.lineWidth = 3;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          const bx = W*0.42 + Math.cos(time+i*1.3)*80;
          ctx.moveTo(bx, H);
          ctx.bezierCurveTo(
            bx + Math.sin(time*0.7+i)*30, H*0.7,
            bx + Math.cos(time*0.5+i)*40, H*0.4,
            bx + Math.sin(time*0.3+i)*50, H*0.1
          );
          ctx.stroke();
        }
      }
    }
  },

  // ===== ACT 3: FELINE HOMUNCULUS - Losing Control =====
  {
    duration: 10,
    theme: 'felineHomunculus',
    subtitle: '"wait... I didn\'t ask it to do that..."',
    draw(t) {
      const th = THEMES.felineHomunculus;

      // Neon glow bleed (from the shader - warm left, cool right)
      const warmGrad = ctx.createLinearGradient(0, 0, W*0.4, 0);
      warmGrad.addColorStop(0, rgba(th.red, 0.12 * (0.7 + Math.sin(time*3)*0.3)));
      warmGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = warmGrad;
      ctx.fillRect(0, 0, W, H);

      const coolGrad = ctx.createLinearGradient(W*0.6, 0, W, 0);
      coolGrad.addColorStop(0, 'transparent');
      coolGrad.addColorStop(1, rgba(th.teal, 0.12 * (0.7 + Math.cos(time*2.7)*0.3)));
      ctx.fillStyle = coolGrad;
      ctx.fillRect(0, 0, W, H);

      // Rain (from feline-homunculus shader!)
      ctx.strokeStyle = rgba('#6080b0', 0.15 + t*0.02);
      ctx.lineWidth = 1;
      for (let i = 0; i < 60 + t*10; i++) {
        const rx = ((i * 37.7 + time*80) % (W+40)) - 20;
        const ry = ((i * 53.3 + time*300) % (H+60)) - 30;
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        ctx.lineTo(rx - 2, ry + 12 + Math.random()*8);
        ctx.stroke();
      }

      // Desk
      ctx.fillStyle = '#0b0e14';
      ctx.fillRect(0, H*0.7, W, H*0.3);

      // Wet pavement reflection (from the shader!)
      for (let px = 0; px < W; px += 4) {
        const refY = H*0.7;

// --- MAIN LOOP ---
let lastTime = 0;

function update(timestamp) {
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  if (!paused) {
    time += dt;
    sceneTime += dt;
  }

  const scene = SCENES[sceneIndex];

  // Scene transition
  if (sceneTime >= scene.duration && sceneIndex < SCENES.length - 1) {
    sceneTime = 0;
    sceneIndex++;
    const newScene = SCENES[sceneIndex];
    if (newScene.subtitle) sub.textContent = newScene.subtitle;

    // Update subtitle color to match theme
    const themeName = newScene.theme;
    sub.style.color = THEMES[themeName].cursor;

    // Switch ambient audio
    if (audioStarted) switchAmbient(themeName);
  }

  // Clear
  ctx.save();
  ctx.fillStyle = THEMES[scene.theme].bg;
  ctx.fillRect(0, 0, W, H);

  // Apply screen shake
  ctx.translate(shakeX, shakeY);

  // Draw current scene
  scene.draw(sceneTime);

  // Draw floating windows and particles (on top)
  updateWindows();
  drawWindows();
  updateParticles();
  drawParticles();

  ctx.restore();

  // Vignette overlay (always)
  const vignette = ctx.createRadialGradient(W/2, H/2, W*0.2, W/2, H/2, W*0.7);
  vignette.addColorStop(0, 'transparent');
  vignette.addColorStop(1, rgba('#000000', 0.5));
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // Scene indicator
  ctx.fillStyle = '#333';
  ctx.font = '10px monospace';
  ctx.fillText(`ACT ${sceneIndex + 1}/${SCENES.length}`, 10, H - 10);

  requestAnimationFrame(update);
}

// --- CONTROLS ---
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    paused = !paused;
    e.preventDefault();
  }
  if (e.code === 'ArrowRight' && sceneIndex < SCENES.length - 1) {
    sceneIndex++;
    sceneTime = 0;
    floatingWindows = [];
    particles = [];
    shakeX = 0; shakeY = 0;
    const s = SCENES[sceneIndex];
    if (s.subtitle) sub.textContent = s.subtitle;
    sub.style.color = THEMES[s.theme].cursor;
  }
  if (e.code === 'ArrowLeft' && sceneIndex > 0) {
    sceneIndex--;
    sceneTime = 0;
    floatingWindows = [];
    particles = [];
    shakeX = 0; shakeY = 0;
    const s = SCENES[sceneIndex];
    if (s.subtitle) sub.textContent = s.subtitle;
    sub.style.color = THEMES[s.theme].cursor;
  }
  if (e.code === 'KeyR') {
    sceneIndex = 0;
    sceneTime = 0;
    time = 0;
    particles = [];
    floatingWindows = [];
    shakeX = 0; shakeY = 0;
    const s = SCENES[0];
    sub.textContent = s.subtitle;
    sub.style.color = THEMES[s.theme].cursor;
    resetSpeech();
    if (audioStarted) switchAmbient(s.theme);
  }
  if (e.code === 'KeyM') {
    toggleMute();
  }
  // Also reset speech on arrow nav
  if (e.code === 'ArrowRight' || e.code === 'ArrowLeft') {
    resetSpeech();
    if (audioStarted) switchAmbient(SCENES[sceneIndex].theme);
  }
});

// --- START ---
// Pause until user clicks (required for audio autoplay policy)
paused = true;
sub.textContent = '';

const overlay = document.getElementById('start-overlay');
overlay.addEventListener('click', () => {
  overlay.classList.add('hidden');
  try {
    initAudio();
    if (!audioCtx) {
      console.warn('No Web Audio support — animation will play without sound');
      console.warn('Safari users: check Settings > Feature Flags for "Web Audio"');
    } else {
      console.log('AudioContext state:', audioCtx.state, 'sampleRate:', audioCtx.sampleRate);
      switchAmbient(SCENES[0].theme);
    }
  } catch(e) {
    console.warn('Audio init failed, continuing without sound:', e);
  }
  paused = false;
  time = 0;
  sceneTime = 0;
  sceneIndex = 0;
  sub.textContent = SCENES[0].subtitle;
  sub.style.color = THEMES[SCENES[0].theme].cursor;
});

// Also allow spacebar to start
document.addEventListener('keydown', function startHandler(e) {
  if (!overlay.classList.contains('hidden')) {
    overlay.click();
    e.preventDefault();
    document.removeEventListener('keydown', startHandler);
  }
});

requestAnimationFrame(update);
</script>
