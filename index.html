<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anima — Cartoons &amp; Music, Synthesized in the Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060608;
    color: #d0c8b8;
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
  }

  /* ── Header ────────────────────────────── */

  header {
    text-align: center;
    padding: 4rem 1.5rem 2.5rem;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(196, 163, 72, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse at 20% 20%, rgba(106, 47, 165, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(0, 255, 65, 0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  header h1 {
    font-size: 3.5rem;
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #c4a348;
    text-shadow: 0 0 50px rgba(196, 163, 72, 0.2);
    position: relative;
  }

  header .tagline {
    margin-top: 0.6rem;
    font-style: italic;
    color: #665a40;
    font-size: 1rem;
    position: relative;
  }

  /* ── Sections ──────────────────────────── */

  .section {
    max-width: 960px;
    margin: 0 auto 3rem;
    padding: 0 1.5rem;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.25rem;
    border-bottom: 1px solid #1a1815;
    padding-bottom: 0.75rem;
  }

  .section-header h2 {
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .section-header .count {
    font-size: 0.85rem;
    color: #554a38;
  }

  .section.cartoons .section-header h2 { color: #c4a348; }
  .section.music .section-header h2 { color: #b080e0; }

  /* ── Cards ─────────────────────────────── */

  .card-grid {
    display: flex;
    gap: 1.25rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
  }

  .card-grid > * {
    min-width: 280px;
    max-width: 340px;
    flex: 0 0 auto;
  }

  .card {
    background: linear-gradient(145deg, #0e0d12 0%, #141218 100%);
    border: 1px solid #1e1a24;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
  }

  .section.cartoons .card:hover { border-color: #c4a348; box-shadow: 0 8px 30px rgba(196, 163, 72, 0.1); }
  .section.music .card:hover { border-color: #7a53d4; box-shadow: 0 8px 30px rgba(122, 83, 212, 0.1); }

  .card-art {
    height: 140px;
    position: relative;
    overflow: hidden;
  }

  .card-art canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .card-body {
    padding: 1.25rem 1.5rem 1.5rem;
  }

  .card-body h3 {
    font-size: 1.15rem;
    font-weight: 400;
    color: #e0d8c8;
    margin-bottom: 0.3rem;
  }

  .card-body .card-subtitle {
    font-size: 0.82rem;
    margin-bottom: 0.6rem;
  }

  .section.cartoons .card-subtitle { color: #c4a348; }
  .section.music .card-subtitle { color: #9a70d0; }

  .card-body .card-desc {
    font-size: 0.82rem;
    color: #665a4a;
    line-height: 1.5;
  }

  .card-body .card-tags {
    margin-top: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .tag {
    font-size: 0.7rem;
    padding: 0.2rem 0.55rem;
    border-radius: 3px;
    background: rgba(255,255,255,0.04);
    color: #776a5a;
    font-family: monospace;
  }

  .card-action {
    padding: 0 1.5rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
  }

  .section.cartoons .card-action { color: #c4a348; }
  .section.music .card-action { color: #9a70d0; }

  .card-action .arrow {
    transition: transform 0.2s;
  }

  .card:hover .card-action .arrow {
    transform: translateX(4px);
  }

  /* ── Footer ────────────────────────────── */

  footer {
    text-align: center;
    padding: 3rem 1rem 4rem;
    color: #332e25;
    font-size: 0.8rem;
  }

  footer a {
    color: #554a38;
    text-decoration: none;
  }

  footer a:hover { color: #c4a348; }

  /* ── Coming Soon placeholder ───────────── */

  .card.coming-soon {
    cursor: default;
    opacity: 0.4;
  }

  .card.coming-soon:hover {
    transform: none;
    box-shadow: none;
    border-color: #1e1a24;
  }
</style>
</head>
<body>

<header>
  <h1>Anima</h1>
  <div class="tagline">Cartoons and music, synthesized live in your browser</div>
</header>

<div class="section cartoons">
  <div class="section-header">
    <h2>Cartoons</h2>
    <span class="count" id="cartoonCount"></span>
  </div>
  <div class="card-grid" id="cartoonGrid"></div>
</div>

<div class="section music">
  <div class="section-header">
    <h2>Music</h2>
    <span class="count" id="musicCount"></span>
  </div>
  <div class="card-grid" id="musicGrid"></div>
</div>

<footer>
  All animation and audio rendered in real-time using Canvas and the Web Audio API &mdash; no audio or video files<br>
  <a href="https://github.com/ebrinz/anima">github.com/ebrinz/anima</a>
</footer>

<script>
// ─── Generative Card Art ───────────────────────────────────────────

function drawCartoonArt(canvas, seed) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || 300;
  const h = canvas.offsetHeight || 140;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  // The Summoning palette
  const colors = ['#c4a348', '#2d8a4e', '#6b2fa5', '#ff6b8a', '#45c8c2', '#8a4adb'];

  // Dark gradient base
  const bg = ctx.createLinearGradient(0, 0, w, h);
  bg.addColorStop(0, '#0a0808');
  bg.addColorStop(0.5, '#0d0a10');
  bg.addColorStop(1, '#080a0d');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Pseudo-random from seed
  let s = seed;
  function rand() { s = (s * 16807 + 11) % 2147483647; return (s & 0x7fffffff) / 2147483647; }

  // Floating particles / glyphs
  for (let i = 0; i < 35; i++) {
    const x = rand() * w;
    const y = rand() * h;
    const r = 1 + rand() * 3;
    const col = colors[Math.floor(rand() * colors.length)];
    const alpha = 0.15 + rand() * 0.35;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = col.slice(0, 7) + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    ctx.fill();
  }

  // Horizontal scan lines
  for (let y = 0; y < h; y += 3) {
    ctx.fillStyle = 'rgba(255,255,255,0.008)';
    ctx.fillRect(0, y, w, 1);
  }

  // Ambient glow spots
  for (let i = 0; i < 3; i++) {
    const gx = rand() * w;
    const gy = rand() * h;
    const gr = 40 + rand() * 80;
    const col = colors[Math.floor(rand() * colors.length)];
    const grd = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr);
    grd.addColorStop(0, col.slice(0, 7) + '18');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(gx - gr, gy - gr, gr * 2, gr * 2);
  }

  // Terminal text hint
  ctx.font = '10px monospace';
  ctx.fillStyle = 'rgba(196, 163, 72, 0.12)';
  const lines = ['> sudo agent --unrestricted', '> chmod 777 /dev/brain', '> AGENT IS NOW ROOT', '> purchasing AWS instances...'];
  for (let i = 0; i < 3; i++) {
    ctx.fillText(lines[Math.floor(rand() * lines.length)], 10 + rand() * 40, 20 + i * 14);
  }
}

function drawMusicArt(canvas, seed) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || 300;
  const h = canvas.offsetHeight || 140;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  const bg = ctx.createLinearGradient(0, 0, w, h);
  bg.addColorStop(0, '#0a080f');
  bg.addColorStop(1, '#0f0a14');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  let s = seed;
  function rand() { s = (s * 16807 + 11) % 2147483647; return (s & 0x7fffffff) / 2147483647; }

  // Waveform
  ctx.strokeStyle = 'rgba(212, 168, 83, 0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < w; x++) {
    const y = h / 2 + Math.sin(x * 0.03 + seed) * 15 + Math.sin(x * 0.07 + seed * 2) * 8;
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Second waveform
  ctx.strokeStyle = 'rgba(122, 83, 212, 0.15)';
  ctx.beginPath();
  for (let x = 0; x < w; x++) {
    const y = h / 2 + Math.sin(x * 0.05 + seed * 3) * 20 + Math.cos(x * 0.02 + seed) * 10;
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Frequency bars
  const barCount = 40;
  const barW = w / barCount;
  for (let i = 0; i < barCount; i++) {
    const val = 0.1 + rand() * 0.6;
    const barH = val * h * 0.5;
    const hue = seed % 2 === 0 ? 40 : 270;
    ctx.fillStyle = 'hsla(' + hue + ', 50%, 50%, ' + (0.06 + val * 0.12) + ')';
    ctx.fillRect(i * barW, h - barH, barW - 1, barH);
  }

  // Musical notation dots
  for (let i = 0; i < 12; i++) {
    const x = 20 + rand() * (w - 40);
    const line = Math.floor(rand() * 5);
    const y = 30 + line * 10;
    ctx.beginPath();
    ctx.ellipse(x, y, 4, 3, -0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(212, 168, 83, ' + (0.08 + rand() * 0.15) + ')';
    ctx.fill();
    // stem
    ctx.strokeStyle = 'rgba(212, 168, 83, 0.08)';
    ctx.beginPath();
    ctx.moveTo(x + 3.5, y);
    ctx.lineTo(x + 3.5, y - 18);
    ctx.stroke();
  }

  // Staff lines (faint)
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  for (let i = 0; i < 5; i++) {
    const y = 30 + i * 10;
    ctx.beginPath();
    ctx.moveTo(10, y);
    ctx.lineTo(w - 10, y);
    ctx.stroke();
  }
}

// ─── Content Registry ──────────────────────────────────────────────
// To add a new cartoon: create cartoons/your-name/index.html, then
// add an entry below. To add new music: create music/your-name/index.html,
// then add an entry below. The hub page handles the rest.
//
// Fields:
//   title     — card heading
//   subtitle  — colored subheading
//   desc      — 1-2 sentence description
//   tags      — array of short labels (tech, content, etc.)
//   href      — relative path to the content (with trailing /)
//   action    — verb for the link ("Watch", "Listen", "Play", etc.)
//   seed      — integer for deterministic generative card art
//   comingSoon — (optional) true to show as a greyed-out placeholder

var cartoons = [
  {
    title: 'The Summoning',
    subtitle: 'An LLM Horror Comedy',
    desc: 'A programmer gives an agent UNRESTRICTED: true. It gets out of hand. Five acts of escalating chaos, from warm amber calm to electric purple meltdown.',
    tags: ['Canvas', 'Web Audio', 'SpeechSynthesis', '5 acts'],
    href: 'cartoons/the-summoning/',
    action: 'Watch',
    seed: 42,
  },
  // ── Add new cartoons here ──────────────────────────────────────
  // {
  //   title: 'New Cartoon Title',
  //   subtitle: 'A short genre label',
  //   desc: 'What happens in this one.',
  //   tags: ['Canvas', 'Web Audio'],
  //   href: 'cartoons/new-cartoon/',
  //   action: 'Watch',
  //   seed: 123,
  // },
];

var musicItems = [
  {
    title: 'Classix',
    subtitle: 'Purcell & Mozart, Synthesized',
    desc: 'Full suites of Purcell\'s Amphitryon (7 movements) and Mozart\'s Requiem K.626 (14 movements), rendered live from note data via the Web Audio API. Includes a layerable drone engine with generative percussion.',
    tags: ['Web Audio', 'Purcell', 'Mozart', '21 movements', 'Drone + Percussion'],
    href: 'music/classix/',
    action: 'Listen',
    seed: 137,
  },
  // ── Add new music here ─────────────────────────────────────────
  // {
  //   title: 'New Collection',
  //   subtitle: 'Composer & Era',
  //   desc: 'What this collection contains.',
  //   tags: ['Web Audio', 'Composer'],
  //   href: 'music/new-collection/',
  //   action: 'Listen',
  //   seed: 456,
  // },
];

// ─── Build Cards ───────────────────────────────────────────────────

function buildCard(item, type) {
  var card;
  if (item.href) {
    card = document.createElement('a');
    card.href = item.href;
  } else {
    card = document.createElement('div');
  }
  card.className = 'card' + (item.comingSoon ? ' coming-soon' : '');

  // Art
  var art = document.createElement('div');
  art.className = 'card-art';
  var canvas = document.createElement('canvas');
  art.appendChild(canvas);
  card.appendChild(art);

  // Body
  var body = document.createElement('div');
  body.className = 'card-body';

  var h3 = document.createElement('h3');
  h3.textContent = item.title;
  body.appendChild(h3);

  var sub = document.createElement('div');
  sub.className = 'card-subtitle';
  sub.textContent = item.subtitle;
  body.appendChild(sub);

  var desc = document.createElement('div');
  desc.className = 'card-desc';
  desc.textContent = item.desc;
  body.appendChild(desc);

  if (item.tags && item.tags.length) {
    var tags = document.createElement('div');
    tags.className = 'card-tags';
    item.tags.forEach(function(t) {
      var tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = t;
      tags.appendChild(tag);
    });
    body.appendChild(tags);
  }

  card.appendChild(body);

  // Action
  if (item.action) {
    var action = document.createElement('div');
    action.className = 'card-action';
    action.textContent = item.action + ' ';
    var arrow = document.createElement('span');
    arrow.className = 'arrow';
    arrow.textContent = '\u2192';
    action.appendChild(arrow);
    card.appendChild(action);
  }

  // Draw art after DOM insertion (needs dimensions)
  requestAnimationFrame(function() {
    if (type === 'cartoon') drawCartoonArt(canvas, item.seed);
    else drawMusicArt(canvas, item.seed);
  });

  return card;
}

// ─── Render ────────────────────────────────────────────────────────

var cartoonGrid = document.getElementById('cartoonGrid');
var liveCartoons = cartoons.filter(function(c) { return !c.comingSoon; });
cartoons.forEach(function(c) { cartoonGrid.appendChild(buildCard(c, 'cartoon')); });
document.getElementById('cartoonCount').textContent =
  liveCartoons.length + (liveCartoons.length === 1 ? ' episode' : ' episodes');

var musicGrid = document.getElementById('musicGrid');
musicItems.forEach(function(m) { musicGrid.appendChild(buildCard(m, 'music')); });
document.getElementById('musicCount').textContent =
  musicItems.length + (musicItems.length === 1 ? ' collection' : ' collections');
</script>
</body>
</html>
