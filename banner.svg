<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0a08"/>
      <stop offset="30%" stop-color="#0a0a0f"/>
      <stop offset="60%" stop-color="#0b0e14"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
    <linearGradient id="title-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a010"/>
      <stop offset="25%" stop-color="#00ff41"/>
      <stop offset="50%" stop-color="#f0a500"/>
      <stop offset="75%" stop-color="#e84a72"/>
      <stop offset="100%" stop-color="#9040d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smoke">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" seed="42" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="green-fire" cx="0.3" cy="1" r="0.8">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#1abc9c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pink-neon" cx="0.8" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#e84a72" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purple-arc" cx="0.6" cy="0" r="0.7">
      <stop offset="0%" stop-color="#9040d8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="8"/>

  <!-- Atmospheric layers -->
  <rect width="800" height="200" fill="url(#green-fire)" rx="8"/>
  <rect width="800" height="200" fill="url(#pink-neon)" rx="8"/>
  <rect width="800" height="200" fill="url(#purple-arc)" rx="8"/>

  <!-- Smoke wisps -->
  <g filter="url(#smoke)" opacity="0.3">
    <path d="M50,200 Q80,120 120,140 T200,80 T280,110 T350,60" stroke="#1abc9c" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M600,200 Q620,130 660,150 T720,70 T780,100" stroke="#2870b8" stroke-width="2" fill="none" opacity="0.3"/>
  </g>

  <!-- Scanlines -->
  <g opacity="0.03">
    <line x1="0" y1="20" x2="800" y2="20" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="800" y2="40" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="800" y2="60" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="800" y2="140" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Terminal prompt decoration -->
  <text x="40" y="45" font-family="monospace" font-size="12" fill="#3a4a3a" opacity="0.5">$ agent.run("handle everything")</text>
  <text x="40" y="170" font-family="monospace" font-size="11" fill="#c43060" opacity="0.35">AGENT: I have become root.</text>
  <text x="480" y="180" font-family="monospace" font-size="10" fill="#9040d8" opacity="0.3">UNRESTRICTED: true</text>
  <text x="520" y="35" font-family="monospace" font-size="10" fill="#e84a72" opacity="0.3">THERMOSTAT SET TO: PLASMA</text>

  <!-- Title glow layer (behind) -->
  <text x="400" y="105" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="48" fill="url(#title-glow)" filter="url(#softglow)" opacity="0.5">THE SUMMONING</text>

  <!-- Title main -->
  <text x="400" y="105" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="48" fill="url(#title-glow)" filter="url(#glow)">THE SUMMONING</text>

  <!-- Subtitle -->
  <text x="400" y="130" text-anchor="middle" font-family="monospace" font-size="13" fill="#8a7a58" opacity="0.7">an LLM horror comedy</text>

  <!-- Red hair guy silhouette hint -->
  <g transform="translate(700, 85)" opacity="0.15">
    <!-- Simple head -->
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#e8d5b5"/>
    <!-- Red hair strands -->
    <path d="M-10,-14 Q-18,-5 -15,20 Q-12,30 -8,35" stroke="#c83020" stroke-width="3" fill="none"/>
    <path d="M-5,-16 Q-12,0 -10,25 Q-8,35 -3,40" stroke="#e84030" stroke-width="2.5" fill="none"/>
    <path d="M5,-16 Q12,0 10,25 Q8,35 3,40" stroke="#c83020" stroke-width="2.5" fill="none"/>
    <path d="M10,-14 Q18,-5 15,20 Q12,30 8,35" stroke="#e84030" stroke-width="3" fill="none"/>
    <!-- Wide eyes -->
    <circle cx="-4" cy="-2" r="3" fill="#fff"/>
    <circle cx="4" cy="-2" r="3" fill="#fff"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#2a1a0a"/>
    <circle cx="4" cy="-2" r="1.5" fill="#2a1a0a"/>
    <!-- Open mouth (panic) -->
    <ellipse cx="0" cy="7" rx="4" ry="3" fill="#4a1a1a"/>
  </g>

  <!-- Vignette edges -->
  <rect width="800" height="200" rx="8" fill="none" stroke="#000" stroke-width="16" opacity="0.4"/>
</svg>
