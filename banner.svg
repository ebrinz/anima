<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0b1a"/>
      <stop offset="40%" stop-color="#0a0e18"/>
      <stop offset="70%" stop-color="#10081a"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="title-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="30%" stop-color="#e84a72"/>
      <stop offset="60%" stop-color="#9040d8"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>
    <linearGradient id="sub-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff41"/>
      <stop offset="50%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#2870b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="warp">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="warm-spot" cx="0.25" cy="0.6" r="0.6">
      <stop offset="0%" stop-color="#f0a030" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool-spot" cx="0.75" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#9040d8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green-spot" cx="0.5" cy="1" r="0.7">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="8"/>

  <!-- Atmospheric layers -->
  <rect width="800" height="200" fill="url(#warm-spot)" rx="8"/>
  <rect width="800" height="200" fill="url(#cool-spot)" rx="8"/>
  <rect width="800" height="200" fill="url(#green-spot)" rx="8"/>

  <!-- Scattered doodle marks — sketchbook feel -->
  <g opacity="0.08" stroke="#fff" stroke-width="1" fill="none">
    <!-- little waveform scribble -->
    <polyline points="50,140 58,130 66,150 74,125 82,155 90,135 98,145"/>
    <!-- circle doodle -->
    <circle cx="720" cy="50" r="18"/>
    <circle cx="720" cy="50" r="12"/>
    <!-- triangle -->
    <polygon points="160,40 175,65 145,65"/>
    <!-- squiggle -->
    <path d="M620,160 Q630,145 640,160 T660,160 T680,160"/>
    <!-- little star -->
    <path d="M350,35 L354,47 L367,47 L357,55 L361,67 L350,59 L339,67 L343,55 L333,47 L346,47 Z"/>
    <!-- cross-hatch -->
    <line x1="100" y1="90" x2="130" y2="90"/>
    <line x1="115" y1="75" x2="115" y2="105"/>
  </g>

  <!-- Faint grid dots — notebook paper -->
  <g opacity="0.04" fill="#fff">
    <circle cx="40" cy="40" r="1"/><circle cx="80" cy="40" r="1"/><circle cx="120" cy="40" r="1"/>
    <circle cx="160" cy="40" r="1"/><circle cx="200" cy="40" r="1"/><circle cx="240" cy="40" r="1"/>
    <circle cx="40" cy="80" r="1"/><circle cx="80" cy="80" r="1"/><circle cx="120" cy="80" r="1"/>
    <circle cx="160" cy="80" r="1"/><circle cx="200" cy="80" r="1"/><circle cx="240" cy="80" r="1"/>
    <circle cx="560" cy="120" r="1"/><circle cx="600" cy="120" r="1"/><circle cx="640" cy="120" r="1"/>
    <circle cx="680" cy="120" r="1"/><circle cx="720" cy="120" r="1"/><circle cx="760" cy="120" r="1"/>
    <circle cx="560" cy="160" r="1"/><circle cx="600" cy="160" r="1"/><circle cx="640" cy="160" r="1"/>
    <circle cx="680" cy="160" r="1"/><circle cx="720" cy="160" r="1"/><circle cx="760" cy="160" r="1"/>
  </g>

  <!-- Wispy smoke decoration -->
  <g filter="url(#warp)" opacity="0.2">
    <path d="M0,180 Q100,120 200,150 T400,100 T600,130 T800,80" stroke="#1abc9c" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M0,50 Q150,80 300,40 T550,70 T800,30" stroke="#9040d8" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Title glow layer -->
  <text x="400" y="95" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="58" fill="url(#title-glow)" filter="url(#softglow)" opacity="0.4">anima</text>

  <!-- Title main -->
  <text x="400" y="95" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="58" fill="url(#title-glow)" filter="url(#glow)">anima</text>

  <!-- Subtitle -->
  <text x="400" y="122" text-anchor="middle" font-family="monospace" font-size="13" fill="#7a8a9a" opacity="0.7">html media sketchbook</text>

  <!-- Decorative tags — vibe code energy -->
  <text x="45" y="178" font-family="monospace" font-size="10" fill="#00ff41" opacity="0.25">&lt;canvas&gt;</text>
  <text x="665" y="35" font-family="monospace" font-size="10" fill="#e84a72" opacity="0.25">&lt;audio&gt;</text>
  <text x="580" y="178" font-family="monospace" font-size="10" fill="#9040d8" opacity="0.25">new OscillatorNode()</text>
  <text x="45" y="35" font-family="monospace" font-size="10" fill="#f0a030" opacity="0.25">ctx.fillRect()</text>

  <!-- Vignette edges -->
  <rect width="800" height="200" rx="8" fill="none" stroke="#000" stroke-width="16" opacity="0.4"/>
</svg>
