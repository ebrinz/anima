<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classix — Browser-Synthesized Classical Music</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #0a0a0f;
    color: #e8e0d0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    border-bottom: 1px solid #2a2520;
  }

  header h1 {
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #d4a853;
    text-shadow: 0 0 40px rgba(212, 168, 83, 0.2);
  }

  header p {
    margin-top: 0.5rem;
    font-style: italic;
    color: #887766;
    font-size: 0.95rem;
  }

  .works {
    max-width: 960px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .work-group {
    margin-bottom: 3rem;
  }

  .work-title {
    font-size: 1.6rem;
    font-weight: 400;
    color: #d4a853;
    border-bottom: 1px solid #2a2520;
    padding-bottom: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .work-title small {
    display: block;
    font-size: 0.85rem;
    color: #776a5a;
    font-weight: 300;
    margin-top: 0.25rem;
  }

  .movements {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .piece-card {
    background: linear-gradient(135deg, #151218 0%, #1a1520 100%);
    border: 1px solid #2a2530;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    transition: border-color 0.3s;
  }

  .piece-card:hover { border-color: #3a3540; }
  .piece-card.playing { border-color: #d4a853; box-shadow: 0 0 30px rgba(212, 168, 83, 0.08); }

  .piece-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .piece-info h3 {
    font-size: 1.1rem;
    font-weight: 400;
    color: #e8dcc8;
  }

  .piece-info .mvt-num {
    color: #d4a853;
    font-size: 0.8rem;
    margin-right: 0.5rem;
  }

  .piece-info .desc {
    color: #665a4a;
    font-size: 0.8rem;
    margin-top: 0.3rem;
    line-height: 1.4;
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-shrink: 0;
  }

  button {
    font-family: inherit;
    background: transparent;
    border: 1px solid #3a3530;
    color: #c8b898;
    padding: 0.45rem 1rem;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  button:hover { background: #d4a853; color: #0a0a0f; border-color: #d4a853; }
  button:disabled { opacity: 0.3; cursor: default; background: transparent; color: #c8b898; border-color: #3a3530; }
  button.stop-btn { border-color: #6a3030; color: #c87070; }
  button.stop-btn:hover { background: #8a3030; color: #fff; border-color: #8a3030; }

  .play-all-btn {
    margin-bottom: 1rem;
    border-color: #d4a853;
    color: #d4a853;
    padding: 0.5rem 1.5rem;
  }

  .visualizer-container { margin-top: 1rem; display: none; }
  .piece-card.playing .visualizer-container { display: block; }

  canvas.visualizer {
    width: 100%;
    height: 60px;
    border-radius: 5px;
    background: #0d0b10;
  }

  .progress-bar {
    margin-top: 0.5rem;
    height: 3px;
    background: #1a1520;
    border-radius: 2px;
    overflow: hidden;
    display: none;
  }

  .piece-card.playing .progress-bar { display: block; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #d4a853, #e8c878);
    width: 0%;
    transition: width 0.3s linear;
    border-radius: 2px;
  }

  .tempo-control {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: #776a5a;
  }

  .tempo-control input[type="range"] { width: 60px; accent-color: #d4a853; }

  .global-controls {
    max-width: 960px;
    margin: 0 auto 1rem;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .global-controls { flex-wrap: wrap; }
  .global-controls label { color: #887766; font-size: 0.85rem; }
  .global-controls input[type="range"] { width: 100px; accent-color: #d4a853; }
  .global-controls span { color: #c8b898; font-size: 0.85rem; min-width: 2.5em; }

  .autoplay-btn {
    border-color: #4a7a40;
    color: #90c880;
    font-size: 0.82rem;
    padding: 0.4rem 1rem;
  }

  .autoplay-btn:hover {
    background: #4a7a40;
    color: #fff;
    border-color: #4a7a40;
  }

  .autoplay-btn.active-toggle {
    background: #4a7a40;
    color: #fff;
    border-color: #5a9a50;
  }

  .breath-label { color: #887766; font-size: 0.82rem; margin-left: 0.5rem; }

  footer {
    text-align: center;
    padding: 3rem 1rem;
    color: #443a30;
    font-size: 0.8rem;
    font-style: italic;
  }

  #back-link {
    position: fixed;
    top: 12px;
    left: 16px;
    color: #554a38;
    font-size: 0.85rem;
    text-decoration: none;
    z-index: 50;
    transition: color 0.2s;
  }
  #back-link:hover { color: #d4a853; }

  /* ── Drone Panel ─────────────────────────── */

  .drone-panel {
    max-width: 960px;
    margin: 0 auto 2rem;
    padding: 0 1.5rem;
  }

  .drone-card {
    background: linear-gradient(135deg, #12101a 0%, #1a1225 100%);
    border: 1px solid #2a2040;
    border-radius: 12px;
    padding: 1.5rem 2rem;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .drone-card.active {
    border-color: #7a53d4;
    box-shadow: 0 0 35px rgba(122, 83, 212, 0.12);
  }

  .drone-card h2 {
    font-size: 1.2rem;
    font-weight: 400;
    color: #c8b0f0;
    margin-bottom: 0.2rem;
  }

  .drone-card .drone-sub {
    font-size: 0.8rem;
    color: #665a7a;
    font-style: italic;
    margin-bottom: 1rem;
  }

  .drone-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem 2rem;
  }

  @media (max-width: 600px) { .drone-grid { grid-template-columns: 1fr; } }

  .drone-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .drone-row label {
    color: #887799;
    font-size: 0.82rem;
    min-width: 5.5em;
    flex-shrink: 0;
  }

  .drone-row input[type="range"] {
    flex: 1;
    accent-color: #7a53d4;
    min-width: 60px;
  }

  .drone-row span {
    color: #b0a0c8;
    font-size: 0.8rem;
    min-width: 3em;
    text-align: right;
  }

  .drone-row select {
    background: #1a1225;
    border: 1px solid #3a3050;
    color: #c8b0f0;
    padding: 0.3rem 0.5rem;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.82rem;
    flex: 1;
  }

  .drone-buttons {
    margin-top: 1.25rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .drone-buttons button {
    border-color: #5a40a0;
    color: #b0a0d0;
  }

  .drone-buttons button:hover {
    background: #7a53d4;
    color: #fff;
    border-color: #7a53d4;
  }

  .drone-buttons button.active-toggle {
    background: #7a53d4;
    color: #fff;
    border-color: #7a53d4;
  }

  .drone-buttons .stop-drone {
    border-color: #6a3060;
    color: #c870a8;
  }

  .drone-buttons .stop-drone:hover {
    background: #8a3060;
    color: #fff;
    border-color: #8a3060;
  }

  .perc-patterns {
    margin-top: 0.75rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .perc-patterns button {
    font-size: 0.78rem;
    padding: 0.3rem 0.8rem;
    border-color: #3a3050;
    color: #887799;
  }

  .perc-patterns button.active-toggle {
    border-color: #7a53d4;
    color: #c8b0f0;
    background: rgba(122, 83, 212, 0.15);
  }

  .drone-viz {
    margin-top: 1rem;
    display: none;
  }

  .drone-card.active .drone-viz { display: block; }

  canvas.drone-canvas {
    width: 100%;
    height: 50px;
    border-radius: 5px;
    background: #0d0a14;
  }
</style>
</head>
<body>
<a id="back-link" href="../../">&larr; Anima</a>

<header>
  <h1>Classix</h1>
  <p>Classical music, synthesized live in your browser</p>
</header>

<div class="global-controls" id="globalBar">
  <label>Master Tempo</label>
  <input type="range" id="globalTempo" min="0.4" max="2.0" step="0.05" value="1.0">
  <span id="globalTempoVal">1.0x</span>
</div>

<div class="drone-panel">
  <div class="drone-card" id="droneCard">
    <h2>Drone + Magic Percussion</h2>
    <div class="drone-sub">A living layer of sustained tones and generative rhythm — plays over everything</div>
    <div class="drone-grid" id="droneGrid"></div>
    <div class="perc-patterns" id="percPatterns"></div>
    <div class="drone-buttons" id="droneButtons"></div>
    <div class="drone-viz">
      <canvas class="drone-canvas" id="droneCanvas"></canvas>
    </div>
  </div>
</div>

<div class="works" id="works"></div>

<footer>All music rendered in real-time using the Web Audio API &mdash; no audio files</footer>

<script>
// ─── Synthesis Engine ──────────────────────────────────────────────

class Synthesizer {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.analyser = null;
    this.activeNodes = [];
    this.scheduledIds = [];
    this.playing = false;
  }

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.4;
    this.analyser = this.ctx.createAnalyser();
    this.analyser.fftSize = 2048;
    this.masterGain.connect(this.analyser);
    this.analyser.connect(this.ctx.destination);
  }

  stop() {
    this.playing = false;
    this.scheduledIds.forEach(id => clearTimeout(id));
    this.scheduledIds = [];
    this.activeNodes.forEach(nd => { try { nd.stop(this.ctx.currentTime + 0.05); } catch(e) {} });
    this.activeNodes = [];
  }

  playNote(freq, startTime, duration, opts = {}) {
    if (!freq || freq < 20) return;
    const ctx = this.ctx;
    const { type='sine', gain=0.15, attack=0.02, decay=0.1, sustain=0.7, release=0.15, vibrato=0, pan=0, detune=0 } = opts;
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    const panner = ctx.createStereoPanner();

    osc.type = type;
    osc.frequency.value = freq;
    if (detune) osc.detune.value = detune;

    if (vibrato > 0) {
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.frequency.value = 5.5;
      lfoGain.gain.value = vibrato;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start(startTime);
      lfo.stop(startTime + duration + release + 0.1);
    }

    panner.pan.value = pan;
    const atkEnd = startTime + attack;
    const dcyEnd = atkEnd + decay;
    const relStart = startTime + duration;
    const relEnd = relStart + release;

    env.gain.setValueAtTime(0, startTime);
    env.gain.linearRampToValueAtTime(gain, atkEnd);
    env.gain.linearRampToValueAtTime(gain * sustain, dcyEnd);
    env.gain.setValueAtTime(gain * sustain, relStart);
    env.gain.linearRampToValueAtTime(0, relEnd);

    osc.connect(env);
    env.connect(panner);
    panner.connect(this.masterGain);
    osc.start(startTime);
    osc.stop(relEnd + 0.05);
    this.activeNodes.push(osc);
    osc.onended = () => { this.activeNodes = this.activeNodes.filter(x => x !== osc); };
  }

  playPiece(score, tempoMul, onProgress, onDone) {
    this.init();
    this.stop();
    this.playing = true;
    const baseTime = this.ctx.currentTime + 0.1;
    let maxEnd = 0;

    for (const voice of score.voices) {
      for (const note of voice.notes) {
        const start = baseTime + (note.time / tempoMul);
        const dur = note.duration / tempoMul;
        this.playNote(note.freq, start, dur, {
          type: voice.type || 'sine',
          gain: (voice.gain || 0.15) * (note.gain || 1),
          attack: voice.attack ?? 0.02, decay: voice.decay ?? 0.1,
          sustain: voice.sustain ?? 0.7, release: voice.release ?? 0.15,
          vibrato: voice.vibrato ?? 0, pan: voice.pan ?? 0,
          detune: note.detune ?? 0,
        });
        maxEnd = Math.max(maxEnd, note.time + note.duration);
      }
    }

    const totalDur = maxEnd / tempoMul;
    if (onProgress) {
      const tick = () => {
        if (!this.playing) return;
        const pct = Math.min((this.ctx.currentTime - baseTime) / totalDur, 1);
        onProgress(pct);
        if (pct < 1) { const id = setTimeout(tick, 80); this.scheduledIds.push(id); }
      };
      tick();
    }
    const doneId = setTimeout(() => { if (this.playing) { this.playing = false; if (onDone) onDone(); } }, totalDur * 1000 + 400);
    this.scheduledIds.push(doneId);
  }
}

// ─── Drone + Magic Percussion Engine ───────────────────────────────

class DroneEngine {
  constructor(synthRef) {
    this.synth = synthRef;
    this.running = false;
    this.droneNodes = [];
    this.percId = null;

    // Drone params
    this.rootNote = 'D';
    this.octave = 2;
    this.droneVolume = 0.3;
    this.shimmer = 0.3;    // controls upper partials / chorus
    this.warmth = 0.5;     // LP filter amount
    this.drift = 0.3;      // slow pitch wandering

    // Perc params
    this.percVolume = 0.4;
    this.percDensity = 0.5;  // 0 = sparse, 1 = busy
    this.percPattern = 'ritual';
    this.percOn = true;

    // Note frequencies for root selection
    this.roots = {
      'C':  65.41, 'C#': 69.30, 'D':  73.42, 'Eb': 77.78,
      'E':  82.41, 'F':  87.31, 'F#': 92.50, 'G':  98.00,
      'Ab': 103.83,'A':  110.00,'Bb': 116.54,'B':  123.47,
    };
  }

  getFreq() {
    const base = this.roots[this.rootNote] || 73.42;
    return base * Math.pow(2, this.octave - 2);
  }

  start() {
    this.synth.init();
    if (this.running) this.stop();
    this.running = true;
    document.getElementById('droneCard').classList.add('active');
    this._startDrone();
    if (this.percOn) this._startPerc();
    this._startViz();
  }

  stop() {
    this.running = false;
    document.getElementById('droneCard').classList.remove('active');
    this.droneNodes.forEach(nd => {
      try { nd.stop(this.synth.ctx.currentTime + 0.3); } catch(e) {}
    });
    this.droneNodes = [];
    if (this.percId) { clearTimeout(this.percId); this.percId = null; }
    if (this._vizId) { cancelAnimationFrame(this._vizId); this._vizId = null; }
  }

  restart() {
    if (this.running) { this.stop(); this.start(); }
  }

  _startDrone() {
    const ctx = this.synth.ctx;
    const now = ctx.currentTime;
    const freq = this.getFreq();
    const vol = this.droneVolume * 0.12;

    // Create a rich drone from layered oscillators
    const layers = [
      { f: freq,       type: 'sine',     g: vol * 1.0 },             // fundamental
      { f: freq,       type: 'triangle', g: vol * 0.4 },             // body
      { f: freq * 2,   type: 'sine',     g: vol * 0.25 },            // octave
      { f: freq * 3,   type: 'sine',     g: vol * 0.08 * this.shimmer * 3 },  // 5th partial
      { f: freq * 1.5, type: 'sine',     g: vol * 0.15 },            // perfect 5th
      // Shimmer layer — slight detune for chorus
      { f: freq * 1.002, type: 'sawtooth', g: vol * 0.06 * this.shimmer * 2 },
      { f: freq * 0.998, type: 'sawtooth', g: vol * 0.06 * this.shimmer * 2 },
      // High shimmer
      { f: freq * 4.01,  type: 'sine', g: vol * 0.04 * this.shimmer * 3 },
    ];

    // Warmth filter
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 200 + this.warmth * 2500;
    filter.Q.value = 0.7;

    // Master envelope for the drone
    const droneGain = ctx.createGain();
    droneGain.gain.setValueAtTime(0, now);
    droneGain.gain.linearRampToValueAtTime(1, now + 2.0); // slow fade in

    for (const layer of layers) {
      const osc = ctx.createOscillator();
      osc.type = layer.type;
      osc.frequency.value = layer.f;

      // Slow pitch drift (LFO)
      if (this.drift > 0) {
        const driftLfo = ctx.createOscillator();
        const driftGain = ctx.createGain();
        driftLfo.frequency.value = 0.05 + Math.random() * 0.1; // very slow
        driftGain.gain.value = layer.f * 0.003 * this.drift;
        driftLfo.connect(driftGain);
        driftGain.connect(osc.frequency);
        driftLfo.start(now);
        this.droneNodes.push(driftLfo);
      }

      const layerGain = ctx.createGain();
      layerGain.gain.value = layer.g;

      osc.connect(layerGain);
      layerGain.connect(filter);
      osc.start(now);
      this.droneNodes.push(osc);
    }

    filter.connect(droneGain);
    droneGain.connect(this.synth.masterGain);
    this.droneNodes.push(filter); // keep ref for cleanup (not stoppable, but that's fine)
    this._droneGain = droneGain;
  }

  _startPerc() {
    const ctx = this.synth.ctx;
    const patterns = this._getPatternDef();

    const scheduleHit = () => {
      if (!this.running || !this.percOn) return;
      const now = ctx.currentTime;

      // Pick a random hit from the pattern
      const hits = patterns.hits;
      const chosen = hits[Math.floor(Math.random() * hits.length)];

      // Determine interval from density
      const baseInterval = patterns.baseInterval;
      const jitter = (Math.random() - 0.5) * baseInterval * 0.4;
      const densityMul = 1.3 - this.percDensity * 0.9; // higher density = shorter intervals
      const interval = Math.max(0.08, baseInterval * densityMul + jitter);

      // Maybe skip this hit (sparser at low density)
      const skipChance = (1 - this.percDensity) * 0.4;
      if (Math.random() > skipChance) {
        this._playPercHit(chosen, now);
      }

      this.percId = setTimeout(scheduleHit, interval * 1000);
    };

    scheduleHit();
  }

  _playPercHit(hit, time) {
    const ctx = this.synth.ctx;
    const vol = this.percVolume * 0.15 * (hit.vol || 1);

    if (hit.type === 'click') {
      // Metallic click — short burst of noise-like oscillation
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = hit.freq || (2000 + Math.random() * 4000);
      env.gain.setValueAtTime(vol, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
      osc.connect(env);
      env.connect(this.synth.masterGain);
      osc.start(time);
      osc.stop(time + 0.05);
    }
    else if (hit.type === 'knock') {
      // Wooden knock — filtered noise burst
      const osc = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const env = ctx.createGain();
      const filt = ctx.createBiquadFilter();
      osc.type = 'triangle';
      osc.frequency.value = hit.freq || (150 + Math.random() * 200);
      osc2.type = 'square';
      osc2.frequency.value = (hit.freq || 200) * 3.7;
      const g2 = ctx.createGain();
      g2.gain.value = vol * 0.3;
      filt.type = 'bandpass';
      filt.frequency.value = hit.freq || 300;
      filt.Q.value = 8;
      env.gain.setValueAtTime(vol, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + (hit.decay || 0.12));
      osc.connect(filt);
      osc2.connect(g2);
      g2.connect(filt);
      filt.connect(env);
      env.connect(this.synth.masterGain);
      osc.start(time); osc.stop(time + 0.2);
      osc2.start(time); osc2.stop(time + 0.2);
    }
    else if (hit.type === 'bell') {
      // Bell / singing bowl
      const partials = [1, 2.32, 3.5, 4.7];
      const baseFreq = hit.freq || (400 + Math.random() * 800);
      for (const p of partials) {
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        const pan = ctx.createStereoPanner();
        osc.type = 'sine';
        osc.frequency.value = baseFreq * p;
        pan.pan.value = (Math.random() - 0.5) * 0.8;
        const pVol = vol * (0.5 / p);
        env.gain.setValueAtTime(pVol, time);
        env.gain.exponentialRampToValueAtTime(0.001, time + (hit.decay || 1.5) / p);
        osc.connect(env);
        env.connect(pan);
        pan.connect(this.synth.masterGain);
        osc.start(time);
        osc.stop(time + 2.5);
      }
    }
    else if (hit.type === 'shaker') {
      // Shaker / rain stick texture — rapid filtered bursts
      const burstCount = 2 + Math.floor(Math.random() * 4);
      for (let i = 0; i < burstCount; i++) {
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        const filt = ctx.createBiquadFilter();
        osc.type = 'sawtooth';
        osc.frequency.value = 3000 + Math.random() * 5000;
        filt.type = 'highpass';
        filt.frequency.value = 4000 + Math.random() * 4000;
        const t = time + i * 0.025;
        env.gain.setValueAtTime(vol * 0.4, t);
        env.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
        osc.connect(filt);
        filt.connect(env);
        env.connect(this.synth.masterGain);
        osc.start(t);
        osc.stop(t + 0.04);
      }
    }
    else if (hit.type === 'boom') {
      // Deep sub boom
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(hit.freq || 80, time);
      osc.frequency.exponentialRampToValueAtTime(30, time + 0.5);
      env.gain.setValueAtTime(vol * 1.5, time);
      env.gain.exponentialRampToValueAtTime(0.001, time + (hit.decay || 0.8));
      osc.connect(env);
      env.connect(this.synth.masterGain);
      osc.start(time);
      osc.stop(time + 1.0);
    }
  }

  _startViz() {
    const canvas = document.getElementById('droneCanvas');
    if (!canvas) return;
    const ctx2d = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx2d.scale(dpr, dpr);
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    const bufLen = this.synth.analyser.frequencyBinCount;
    const freqData = new Uint8Array(bufLen);
    const self = this;

    function draw() {
      if (!self.running) { ctx2d.clearRect(0, 0, w, h); return; }
      self._vizId = requestAnimationFrame(draw);
      self.synth.analyser.getByteFrequencyData(freqData);

      ctx2d.fillStyle = '#0d0a14';
      ctx2d.fillRect(0, 0, w, h);

      // Flowing frequency landscape
      const barCount = 80;
      const barW = w / barCount;
      const step = Math.floor(bufLen / barCount);
      for (let i = 0; i < barCount; i++) {
        const val = freqData[i * step] / 255;
        const hue = 260 + val * 40; // purple range
        ctx2d.fillStyle = 'hsla(' + hue + ', 60%, ' + (30 + val * 40) + '%, ' + (0.2 + val * 0.5) + ')';
        const barH = val * h * 0.85;
        ctx2d.fillRect(i * barW, h - barH, barW - 0.5, barH);
      }
    }
    draw();
  }
}

// ─── Music Helpers ─────────────────────────────────────────────────

const NF = {};
const NN = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
for (let o = 0; o <= 8; o++) for (let i = 0; i < 12; i++) {
  NF[NN[i]+o] = 440 * Math.pow(2, ((o+1)*12+i-69)/12);
}
for (let o = 0; o <= 7; o++) {
  NF['Db'+o]=NF['C#'+o]; NF['Eb'+o]=NF['D#'+o]; NF['Gb'+o]=NF['F#'+o];
  NF['Ab'+o]=NF['G#'+o]; NF['Bb'+o]=NF['A#'+o];
}

function n(name, time, dur, extra) { return Object.assign({ freq: NF[name], time, duration: dur }, extra || {}); }

// Sequence helper: array of [noteName, duration] starting at t
function seq(t, pairs, gap) {
  gap = gap || 0;
  const out = [];
  let time = t;
  for (const p of pairs) {
    if (p[0] !== 'R') out.push(n(p[0], time, p[1]));
    time += p[1] + gap;
  }
  return out;
}

// Chord: play multiple notes at same time
function chord(names, time, dur) {
  return names.map(nm => n(nm, time, dur));
}

// Repeated pulse pattern on a chord progression
function pulse(segments, interval, noteDur) {
  const notes = [];
  for (const seg of segments) {
    const end = seg.t + seg.dur;
    for (let t = seg.t; t < end; t += interval) {
      for (const nm of seg.ch) notes.push(n(nm, t, noteDur));
    }
  }
  return notes;
}

// Bass line helper: array of [note, time, duration]
function bassLine(arr) { return arr.map(a => n(a[0], a[1], a[2])); }

// ════════════════════════════════════════════════════════════════════
//  UI
// ════════════════════════════════════════════════════════════════════

const allWorks = [purcell, mozart];
const synth = new Synthesizer();
let currentId = null;
let animFrameId = null;
let playQueue = [];
let queueIdx = -1;
let autoplay = false;
let breathMs = 1500; // pause between pieces

function getGlobalTempo() {
  return parseFloat(document.getElementById('globalTempo').value);
}

document.getElementById('globalTempo').addEventListener('input', function() {
  document.getElementById('globalTempoVal').textContent = parseFloat(this.value).toFixed(2) + 'x';
});

// Autoplay + breath controls (built via DOM)
(function buildAutoplayUI() {
  var bar = document.getElementById('globalBar');

  var sep = document.createTextNode(' ');
  bar.appendChild(sep);

  var breathLbl = document.createElement('label');
  breathLbl.className = 'breath-label';
  breathLbl.textContent = 'Breath';
  bar.appendChild(breathLbl);

  var breathSlider = document.createElement('input');
  breathSlider.type = 'range';
  breathSlider.min = '0.3';
  breathSlider.max = '5';
  breathSlider.step = '0.1';
  breathSlider.value = '1.5';
  bar.appendChild(breathSlider);

  var breathVal = document.createElement('span');
  breathVal.textContent = '1.5s';
  bar.appendChild(breathVal);

  breathSlider.addEventListener('input', function() {
    breathMs = parseFloat(breathSlider.value) * 1000;
    breathVal.textContent = parseFloat(breathSlider.value).toFixed(1) + 's';
  });

  var autoBtn = document.createElement('button');
  autoBtn.className = 'autoplay-btn';
  autoBtn.textContent = '\u221E Autoplay All';
  bar.appendChild(autoBtn);

  autoBtn.addEventListener('click', function() {
    if (autoplay) {
      // Turn off autoplay (don't stop current piece, just stop continuing)
      autoplay = false;
      autoBtn.classList.remove('active-toggle');
      autoBtn.textContent = '\u221E Autoplay All';
      playQueue = [];
      queueIdx = -1;
    } else {
      // Turn on and start from the beginning
      autoplay = true;
      autoBtn.classList.add('active-toggle');
      autoBtn.textContent = '\u221E Autoplay On';
      playAllEverything();
    }
  });
})();

function buildCard(piece, id) {
  const card = document.createElement('div');
  card.className = 'piece-card';
  card.id = 'card-' + id;

  const header = document.createElement('div');
  header.className = 'piece-header';

  const info = document.createElement('div');
  info.className = 'piece-info';
  const h3 = document.createElement('h3');
  h3.textContent = piece.title;
  info.appendChild(h3);
  if (piece.desc) {
    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = piece.desc;
    info.appendChild(desc);
  }

  const controls = document.createElement('div');
  controls.className = 'controls';
  const playBtn = document.createElement('button');
  playBtn.id = 'play-' + id;
  playBtn.textContent = '\u25B6 Play';
  playBtn.addEventListener('click', function() { playSingle(id); });
  const stopBtn = document.createElement('button');
  stopBtn.className = 'stop-btn';
  stopBtn.id = 'stop-' + id;
  stopBtn.textContent = '\u25A0 Stop';
  stopBtn.disabled = true;
  stopBtn.addEventListener('click', function() { stopCurrent(); });
  controls.appendChild(playBtn);
  controls.appendChild(stopBtn);

  header.appendChild(info);
  header.appendChild(controls);
  card.appendChild(header);

  const vizC = document.createElement('div');
  vizC.className = 'visualizer-container';
  const canvas = document.createElement('canvas');
  canvas.className = 'visualizer';
  canvas.id = 'canvas-' + id;
  vizC.appendChild(canvas);
  card.appendChild(vizC);

  const pBar = document.createElement('div');
  pBar.className = 'progress-bar';
  const pFill = document.createElement('div');
  pFill.className = 'progress-fill';
  pFill.id = 'progress-' + id;
  pBar.appendChild(pFill);
  card.appendChild(pBar);

  return card;
}

// Flat list for lookup
const allPieces = [];

function render() {
  const container = document.getElementById('works');
  let globalIdx = 0;

  for (const work of allWorks) {
    const group = document.createElement('div');
    group.className = 'work-group';

    const title = document.createElement('div');
    title.className = 'work-title';
    title.textContent = work.title;
    const sub = document.createElement('small');
    sub.textContent = work.subtitle;
    title.appendChild(sub);
    group.appendChild(title);

    // Play All button
    const startIdx = globalIdx;
    const playAllBtn = document.createElement('button');
    playAllBtn.className = 'play-all-btn';
    playAllBtn.textContent = '\u25B6 Play Entire Work';
    const endIdx = startIdx + work.movements.length;
    playAllBtn.addEventListener('click', function() { playAll(startIdx, endIdx); });
    group.appendChild(playAllBtn);

    const mvts = document.createElement('div');
    mvts.className = 'movements';

    for (const mvt of work.movements) {
      allPieces.push(mvt);
      mvts.appendChild(buildCard(mvt, globalIdx));
      globalIdx++;
    }

    group.appendChild(mvts);
    container.appendChild(group);
  }
}

function playSingle(id) {
  stopCurrent();
  playQueue = [];
  queueIdx = -1;
  startPiece(id);
}

function playAll(startIdx, endIdx) {
  stopCurrent();
  playQueue = [];
  for (let i = startIdx; i < endIdx; i++) playQueue.push(i);
  queueIdx = 0;
  startPiece(playQueue[0]);
}

function playAllEverything() {
  stopCurrent();
  playQueue = [];
  for (let i = 0; i < allPieces.length; i++) playQueue.push(i);
  queueIdx = 0;
  startPiece(playQueue[0]);
}

function startPiece(id) {
  synth.init();
  currentId = id;
  const card = document.getElementById('card-' + id);
  const playBtn = document.getElementById('play-' + id);
  const stopBtn = document.getElementById('stop-' + id);
  const progress = document.getElementById('progress-' + id);

  card.classList.add('playing');
  playBtn.disabled = true;
  stopBtn.disabled = false;
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const canvas = document.getElementById('canvas-' + id);
  startVisualizer(canvas);

  synth.playPiece(allPieces[id], getGlobalTempo(),
    function(pct) { progress.style.width = (pct * 100) + '%'; },
    function() {
      cleanupPiece(id);
      // Play next in queue, or autoplay next
      if (playQueue.length > 0 && queueIdx >= 0) {
        queueIdx++;
        if (queueIdx < playQueue.length) {
          setTimeout(function() { startPiece(playQueue[queueIdx]); }, breathMs);
        } else {
          playQueue = [];
          queueIdx = -1;
          // If autoplay, wrap around to first piece
          if (autoplay) {
            setTimeout(function() { playAllEverything(); }, breathMs);
          }
        }
      } else if (autoplay) {
        // Single piece finished, advance to next
        var next = id + 1;
        if (next >= allPieces.length) next = 0;
        setTimeout(function() { startPiece(next); }, breathMs);
      }
    }
  );
}

function cleanupPiece(id) {
  const card = document.getElementById('card-' + id);
  const playBtn = document.getElementById('play-' + id);
  const stopBtn = document.getElementById('stop-' + id);
  const progress = document.getElementById('progress-' + id);
  if (card) card.classList.remove('playing');
  if (playBtn) playBtn.disabled = false;
  if (stopBtn) stopBtn.disabled = true;
  if (progress) progress.style.width = '0%';
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
}

function stopCurrent() {
  synth.stop();
  playQueue = [];
  queueIdx = -1;
  if (currentId !== null) {
    cleanupPiece(currentId);
    currentId = null;
  }
  // Reset autoplay UI if active
  if (autoplay) {
    autoplay = false;
    var ab = document.querySelector('.autoplay-btn');
    if (ab) { ab.classList.remove('active-toggle'); ab.textContent = '\u221E Autoplay All'; }
  }
}

function startVisualizer(canvas) {
  const ctx2d = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx2d.scale(dpr, dpr);

  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  const bufLen = synth.analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufLen);

  function draw() {
    if (!synth.playing) { ctx2d.clearRect(0, 0, w, h); return; }
    animFrameId = requestAnimationFrame(draw);
    synth.analyser.getByteTimeDomainData(dataArray);

    ctx2d.fillStyle = '#0d0b10';
    ctx2d.fillRect(0, 0, w, h);

    ctx2d.lineWidth = 1.5;
    ctx2d.strokeStyle = '#d4a853';
    ctx2d.beginPath();
    const sliceW = w / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const y = (dataArray[i] / 128.0) * h / 2;
      if (i === 0) ctx2d.moveTo(x, y); else ctx2d.lineTo(x, y);
      x += sliceW;
    }
    ctx2d.lineTo(w, h / 2);
    ctx2d.stroke();

    const freqData = new Uint8Array(bufLen);
    synth.analyser.getByteFrequencyData(freqData);
    const barCount = 48;
    const barW = w / barCount;
    const step = Math.floor(bufLen / barCount);
    for (let i = 0; i < barCount; i++) {
      const val = freqData[i * step] / 255;
      ctx2d.fillStyle = 'rgba(212, 168, 83, ' + (0.12 + val * 0.2) + ')';
      ctx2d.fillRect(i * barW, h - val * h * 0.6, barW - 1, val * h * 0.6);
    }
  }
  draw();
}

render();

// ─── Drone UI ──────────────────────────────────────────────────────

const drone = new DroneEngine(synth);

(function buildDroneUI() {
  const grid = document.getElementById('droneGrid');
  const btns = document.getElementById('droneButtons');
  const percP = document.getElementById('percPatterns');

  function row(labelText, inputEl, valEl) {
    const r = document.createElement('div');
    r.className = 'drone-row';
    const lbl = document.createElement('label');
    lbl.textContent = labelText;
    r.appendChild(lbl);
    r.appendChild(inputEl);
    if (valEl) r.appendChild(valEl);
    return r;
  }

  function slider(min, max, step, val, onChange) {
    const inp = document.createElement('input');
    inp.type = 'range'; inp.min = min; inp.max = max; inp.step = step; inp.value = val;
    const sp = document.createElement('span');
    sp.textContent = Number(val).toFixed(step < 1 ? (step < 0.1 ? 2 : 1) : 0);
    inp.addEventListener('input', function() {
      sp.textContent = Number(inp.value).toFixed(step < 1 ? (step < 0.1 ? 2 : 1) : 0);
      onChange(parseFloat(inp.value));
    });
    return { inp, sp };
  }

  // Root note select
  const rootSel = document.createElement('select');
  ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'].forEach(function(nm) {
    const opt = document.createElement('option');
    opt.value = nm; opt.textContent = nm;
    if (nm === 'D') opt.selected = true;
    rootSel.appendChild(opt);
  });
  rootSel.addEventListener('change', function() { drone.rootNote = rootSel.value; drone.restart(); });
  grid.appendChild(row('Root', rootSel));

  // Octave
  var s = slider(1, 4, 1, 2, function(v) { drone.octave = v; drone.restart(); });
  grid.appendChild(row('Octave', s.inp, s.sp));

  // Drone volume
  s = slider(0, 1, 0.05, 0.3, function(v) { drone.droneVolume = v; drone.restart(); });
  grid.appendChild(row('Drone Vol', s.inp, s.sp));

  // Shimmer
  s = slider(0, 1, 0.05, 0.3, function(v) { drone.shimmer = v; drone.restart(); });
  grid.appendChild(row('Shimmer', s.inp, s.sp));

  // Warmth
  s = slider(0, 1, 0.05, 0.5, function(v) { drone.warmth = v; drone.restart(); });
  grid.appendChild(row('Warmth', s.inp, s.sp));

  // Drift
  s = slider(0, 1, 0.05, 0.3, function(v) { drone.drift = v; drone.restart(); });
  grid.appendChild(row('Drift', s.inp, s.sp));

  // Perc volume
  s = slider(0, 1, 0.05, 0.4, function(v) { drone.percVolume = v; });
  grid.appendChild(row('Perc Vol', s.inp, s.sp));

  // Perc density
  s = slider(0, 1, 0.05, 0.5, function(v) { drone.percDensity = v; });
  grid.appendChild(row('Density', s.inp, s.sp));

  // Perc pattern buttons
  var patterns = [
    { id: 'ritual', label: 'Ritual' },
    { id: 'bells',  label: 'Singing Bowls' },
    { id: 'rain',   label: 'Rain' },
    { id: 'tribal', label: 'Tribal' },
    { id: 'glass',  label: 'Glass' },
    { id: 'none',   label: 'Drone Only' },
  ];
  patterns.forEach(function(pat) {
    var b = document.createElement('button');
    b.textContent = pat.label;
    b.dataset.pat = pat.id;
    if (pat.id === 'ritual') b.classList.add('active-toggle');
    b.addEventListener('click', function() {
      percP.querySelectorAll('button').forEach(function(x) { x.classList.remove('active-toggle'); });
      b.classList.add('active-toggle');
      drone.percPattern = pat.id;
      drone.percOn = pat.id !== 'none';
      if (drone.running) {
        if (drone.percId) { clearTimeout(drone.percId); drone.percId = null; }
        if (drone.percOn) drone._startPerc();
      }
    });
    percP.appendChild(b);
  });

  // Start / Stop buttons
  var startBtn = document.createElement('button');
  startBtn.textContent = '\u2662 Start Drone';
  startBtn.addEventListener('click', function() { drone.start(); });

  var stopBtn = document.createElement('button');
  stopBtn.className = 'stop-drone';
  stopBtn.textContent = '\u25A0 Stop Drone';
  stopBtn.addEventListener('click', function() { drone.stop(); });

  btns.appendChild(startBtn);
  btns.appendChild(stopBtn);
})();
